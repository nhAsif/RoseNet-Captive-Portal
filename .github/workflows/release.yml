name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Push events to new tags like v1.0.0
  workflow_dispatch:

jobs:
  frontend:
    name: Build admin frontend
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend-admin/package-lock.json

    # Source lives in frontend-admin/; the build emits static files into
    # frontend/admin/ (git-ignored). Built once here and shared with every
    # matrix arch below via an artifact so we don't rebuild it N times.
    - name: Install and build admin frontend
      run: |
        cd frontend-admin
        npm ci
        npm run build
      shell: bash

    - name: Upload admin build
      uses: actions/upload-artifact@v4
      with:
        name: admin-frontend
        path: frontend/admin
        if-no-files-found: error
        retention-days: 1

  build:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux]
        arch: [amd64, arm64]
        include:
          - os: linux
            arch: arm # For 32-bit ARM Linux
          - os: linux
            arch: mipsle # For ramips

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Restore the compiled admin dashboard into frontend/admin/ so the release
    # archive's `cp -r frontend` picks it up.
    - name: Download admin frontend
      uses: actions/download-artifact@v4
      with:
        name: admin-frontend
        path: frontend/admin

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22' # Use a recent Go version

    - name: Install UPX
      run: |
        sudo apt-get update
        sudo apt-get install -y upx-ucl
      shell: bash

    - name: Build backend
      run: |
        cd backend
        BINARY_NAME="voucher_server"
        GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o $BINARY_NAME .
        mv $BINARY_NAME ../ # Move to root of workspace
      shell: bash

    - name: Compress binary with UPX
      run: |
        upx --best --lzma voucher_server
      shell: bash

    - name: Create release archive and checksum
      run: |
        RELEASE_NAME="RoseNet-Portal-${{ matrix.os }}-${{ matrix.arch }}"

        # Create a temporary directory to stage files
        mkdir -p "${RELEASE_NAME}"
        cp "voucher_server" "${RELEASE_NAME}/"
        cp -r frontend "${RELEASE_NAME}/"
        cp nodogsplash/nodogsplash.conf "${RELEASE_NAME}/"
        cp LICENSE "${RELEASE_NAME}/"
        cp -r scripts "${RELEASE_NAME}/"

        ARCHIVE_NAME="${RELEASE_NAME}.zip"
        zip -r "${ARCHIVE_NAME}" "${RELEASE_NAME}"

        # Generate SHA256 checksum
        sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

        rm -rf "${RELEASE_NAME}" # Clean up temporary directory
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-${{ matrix.arch }}
        path: |
          RoseNet-Portal-${{ matrix.os }}-${{ matrix.arch }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: linux-* # Only the per-arch release archives, not admin-frontend

    - name: List downloaded artifacts
      run: ls -R artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
